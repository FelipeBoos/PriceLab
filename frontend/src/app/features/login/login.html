<section>
    @if (mensagemToast; as mensagem) {
        <div class="avisos-container">
            <div class="aviso-item aviso-sucesso">
                <span class="aviso-icone" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6 9 17l-5-5"></path>
                    </svg>
                </span>

                <div class="aviso-texto">
                    <span class="aviso-titulo">Notificação</span>
                    <span>{{ mensagem }}</span>
                </div>

                <button type="button" class="aviso-close" (click)="fecharToast()" aria-label="Fechar aviso">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"></path>
                        <path d="M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
    }

    <div>
        <h1>Login</h1>
        <p>Acesse sua conta para continuar</p>
    </div>

    <form>
        <div>
            <label for="email">E-mail</label>
            <input id="email" type="email" name="email">
        </div>

        <div>
            <label for="senha">Senha</label>
            <input id="senha" type="password" name="senha">
        </div>

        <button type="button" (click)="botaoEntrar()">Entrar</button>
        <hr>
        <button type="button" (click)="botaoCriarConta()">Criar conta</button>
    </form>
</section>
