<section class="page">
    <h1>Categorias</h1>

    <div class="actions">
        <button class="btn btn-primary btn-list" type="button" (click)="incluirCategoria()">+ Nova</button>
        <button class="btn btn-secondary btn-list" type="button" (click)="filtrarCategoria()">Filtrar</button>
    </div>

    <hr>

    <h2>Categorias cadastradas</h2>

    @if (categorias().length === 0) {
    <p>Nenhuma categoria cadastrada.</p>
    }

    @if (categorias().length > 0) {
    <div class="table-container categoria">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>
                @for (categoria of categorias(); track categoria.id) {
                <tr>
                    <td>{{ categoria.id }}</td>
                    <td>{{ categoria.nome }}</td>
                    <td>{{ categoria.descricao }}</td>
                    <td>
                        <div class="actions-inline">
                            <button class="btn btn-secondary btn-circle" type="button" title="Editar"
                                aria-label="Editar" (click)="editarCategoria(categoria.id)">
                                <span class="btn-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                        <path d="M12 20h9" />
                                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" />
                                    </svg>
                                </span>
                            </button>
                            <button class="btn btn-secondary btn-circle" type="button" title="Deletar"
                                aria-label="Deletar" (click)="deletarCategoria(categoria.id)">
                                <span class="btn-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                        <path d="M3 6h18" />
                                        <path d="M8 6V4h8v2" />
                                        <path d="M19 6l-1 14H6L5 6" />
                                        <path d="M10 11v6" />
                                        <path d="M14 11v6" />
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
    }

</section>

<app-modal [aberto]="exibirFormulario" [titulo]="categoriaEmEdicaoId === null ? 'Nova Categoria' : 'Editar Categoria'"
    (fechar)="resetarFormulario()">
    <form (ngSubmit)="salvarCategoria()">
        <div>
            <label for="nome">Nome</label>
            <input id="nome" type="text" [(ngModel)]="nome" name="nome">
        </div>

        <div>
            <label for="descricao">Descrição</label>
            <input id="descricao" type="text" [(ngModel)]="descricao" name="descricao">
        </div>

        <div class="modal-actions">
            <button class="btn btn-primary" type="submit">{{ categoriaEmEdicaoId === null ? 'Salvar' : 'Atualizar'
                }}</button>

            <button class="btn btn-secondary" type="button" (click)="resetarFormulario()">Cancelar</button>
        </div>
    </form>
</app-modal>
