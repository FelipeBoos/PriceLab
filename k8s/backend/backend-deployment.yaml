apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pricelab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: pricelab-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pricelab-config
            - secretRef:
                name: pricelab-secret