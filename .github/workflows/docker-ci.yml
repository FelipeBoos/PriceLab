name: Docker CI

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci.yml"

jobs:
  validate-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file for compose validation
        run: |
          echo "POSTGRES_DB=pricelab" >> .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "BACKEND_PORT=8080" >> .env
          echo "FRONTEND_PORT=4200" >> .env

      - name: Validate docker compose configuration
        run: docker compose config

  build-backend-image:
    runs-on: ubuntu-latest
    needs: validate-compose

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t pricelab-backend ./backend

  build-frontend-image:
    runs-on: ubuntu-latest
    needs: validate-compose

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t pricelab-frontend ./frontend