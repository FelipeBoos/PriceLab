name: Docker CI

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci.yml"
  workflow_dispatch:

jobs:
  validate-docker-compose:
    name: Validate Docker Compose configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file for validation
        run: |
          echo "POSTGRES_DB=pricelab" >> .env
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "BACKEND_PORT=8080" >> .env
          echo "FRONTEND_PORT=4200" >> .env

      - name: Validate docker-compose.yml
        run: docker compose config

  build-backend-docker-image:
    name: Build backend Docker image
    runs-on: ubuntu-latest
    needs: validate-docker-compose

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pricelab-backend ./backend

  build-frontend-docker-image:
    name: Build frontend Docker image
    runs-on: ubuntu-latest
    needs: validate-docker-compose

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t pricelab-frontend ./frontend