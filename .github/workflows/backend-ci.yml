name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw -B clean test

      - name: Print Surefire Reports
        if: failure()
        run: |
          echo "=== Surefire files ==="
          find target/surefire-reports -type f | sort || true
          echo "=== CategoriaRepositoryTest ==="
          cat target/surefire-reports/com.felipeboos.gestao_produtos.repository.CategoriaRepositoryTest.txt || true
          echo "=== ProdutoRepositoryTest ==="
          cat target/surefire-reports/com.felipeboos.gestao_produtos.repository.ProdutoRepositoryTest.txt || true
          echo "=== EstrategiaPrecoRepositoryTest ==="
          cat target/surefire-reports/com.felipeboos.gestao_produtos.repository.EstrategiaPrecoRepositoryTest.txt || true

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/**