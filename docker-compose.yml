services:
  db:
    image: postgres:16
    container_name: pricelab-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pricelab_postgres_data:/var/lib/postgresql/data

volumes:
  pricelab_postgres_data: